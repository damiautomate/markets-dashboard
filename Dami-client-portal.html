<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Portal — Dami Market</title>
<meta name="description" content="Track your project progress in real-time. Built by Dami Market.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
:root {
  --a:#00D4AA; --ad:rgba(0,212,170,0.13); --ag:rgba(0,212,170,0.25); --ab:#33EACC;
  --bg:#0A0A0F; --bg2:#12121A; --bgc:#16161F;
  --t:#E8E8ED; --tm:#8888A0; --bd:#2A2A3A;
  --y:#FBBF24; --r:#EF4444;
  --fd:'Syne',sans-serif; --fb:'DM Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--bg);color:var(--t);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:10px}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;padding:.85rem 1.5rem;background:rgba(10,10,15,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:12px}
.hdr-r{display:flex;align-items:center;gap:10px}
.logo{width:34px;height:34px;border-radius:8px;background:linear-gradient(135deg,var(--a),#00A888);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:800;font-size:14px;color:#0A0A0F;box-shadow:0 2px 12px var(--ag)}
.brand{font-family:var(--fd);font-weight:700;font-size:.95rem}.brand span{color:var(--a)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:.5rem 1.1rem;border-radius:8px;font-family:var(--fb);font-size:.82rem;font-weight:600;border:none;cursor:pointer;transition:all .2s}
.btn-a{background:var(--a);color:#0A0A0F}.btn-a:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--ag)}
.btn-g{background:transparent;color:var(--tm);border:1px solid var(--bd)}.btn-g:hover{border-color:var(--a);color:var(--a);background:var(--ad)}
.btn-s{padding:.35rem .8rem;font-size:.78rem}
.btn-d{background:rgba(239,68,68,.12);color:var(--r);border:1px solid transparent}.btn-d:hover{border-color:var(--r)}

/* LAYOUT */
.layout{display:flex;height:calc(100vh - 53px)}
.sidebar{width:280px;border-right:1px solid var(--bd);background:var(--bg2);display:flex;flex-direction:column;flex-shrink:0}
.sb-hdr{padding:16px;border-bottom:1px solid var(--bd)}
.sb-title{font-family:var(--fd);font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tm)}
.sb-list{flex:1;overflow-y:auto;padding:8px}
.pi{padding:12px;border-radius:10px;cursor:pointer;margin-bottom:4px;transition:all .2s;border:1px solid transparent}
.pi:hover{background:var(--bgc)}.pi.active{background:var(--bgc);border-color:var(--a)}
.pi-title{font-weight:600;font-size:.88rem;margin-bottom:3px}.pi-client{font-size:.76rem;color:var(--tm);margin-bottom:8px}
.pi-bar{height:3px;border-radius:2px;background:var(--bd);overflow:hidden}.pi-fill{height:100%;border-radius:2px;background:var(--a);transition:width .6s}
.pi-meta{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.pi-pct{font-size:.72rem;font-weight:700;color:var(--a);font-family:var(--fd)}
.dot-status{display:flex;align-items:center;gap:4px;font-size:.7rem;color:var(--tm)}
.dot-status .dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* MAIN */
.main{flex:1;overflow-y:auto;background:var(--bg)}
.inner{max-width:900px;margin:0 auto;padding:32px 28px 60px}

/* PROJECT HEADER */
.pj-badge{display:inline-flex;align-items:center;gap:6px;padding:.3rem .85rem;border-radius:50px;font-size:.76rem;font-weight:600;margin-bottom:12px}
.pj-title{font-family:var(--fd);font-size:1.7rem;font-weight:800;letter-spacing:-.03em;margin-bottom:6px}
.pj-client{font-size:.92rem;color:var(--tm);margin-bottom:16px}
.pj-desc{font-size:.9rem;color:var(--tm);line-height:1.7;max-width:700px;margin-bottom:20px}
.pj-dates{display:flex;gap:24px;font-size:.82rem;color:var(--tm);flex-wrap:wrap}.pj-dates strong{color:var(--t)}

/* PROGRESS */
.prog-sec{margin-bottom:36px}
.prog-top{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-label{font-family:var(--fd);font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tm)}
.prog-pct{font-family:var(--fd);font-size:1.3rem;font-weight:800;color:var(--a)}
.prog-track{height:8px;border-radius:4px;background:var(--bd);overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--a),var(--ab));transition:width 1s ease}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:28px}
.tab{padding:10px 18px;background:none;border:none;cursor:pointer;font-family:var(--fb);font-size:.85rem;font-weight:600;color:var(--tm);border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--t)}.tab.active{color:var(--a);border-bottom-color:var(--a)}

/* CARDS */
.card{background:var(--bgc);border:1px solid var(--bd);border-radius:12px;padding:20px;margin-bottom:14px;transition:border-color .2s}
.card:hover{border-color:var(--a)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.card-title{font-family:var(--fd);font-weight:700;font-size:.95rem}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:50px;font-size:.7rem;font-weight:600}
.card-body{font-size:.85rem;color:var(--tm);line-height:1.7}
.card-impact{margin-top:12px;padding:12px 14px;background:var(--ad);border-left:3px solid var(--a);border-radius:0 8px 8px 0}
.impact-label{font-weight:700;color:var(--a);font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.impact-text{font-size:.82rem;line-height:1.6;color:var(--t)}
.card-date{font-size:.76rem;color:var(--tm);margin-top:10px}

/* TIMELINE */
.timeline{position:relative;padding-left:24px}
.timeline::before{content:'';position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:var(--bd)}
.tl-item{position:relative;margin-bottom:20px}
.tl-dot{position:absolute;left:-24px;top:4px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;z-index:1}
.tl-date{font-size:.74rem;color:var(--tm);margin-bottom:4px}.tl-title{font-weight:700;font-size:.9rem;margin-bottom:4px}
.tl-body{font-size:.84rem;color:var(--tm);line-height:1.65}
.tl-tag{display:inline-flex;font-size:.7rem;color:var(--a);font-weight:600;background:var(--ad);padding:2px 8px;border-radius:4px;margin-top:8px}

/* GANTT */
.gantt-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.gantt-label{width:160px;flex-shrink:0;font-size:.8rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-track{flex:1;height:24px;background:var(--bd);border-radius:6px;position:relative;overflow:hidden}
.gantt-bar{position:absolute;top:3px;bottom:3px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#0A0A0F;transition:all .6s}

/* LOGIN / GATE */
.gate{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.gate::before{content:'';position:absolute;inset:0;background-image:linear-gradient(var(--bd) 1px,transparent 1px),linear-gradient(90deg,var(--bd) 1px,transparent 1px);background-size:60px 60px;opacity:.2}
.gate::after{content:'';position:absolute;top:20%;right:-10%;width:500px;height:500px;background:radial-gradient(circle,var(--ag) 0%,transparent 70%);border-radius:50%}
.gate-card{position:relative;z-index:1;background:var(--bgc);border:1px solid var(--bd);border-radius:16px;padding:40px;max-width:420px;width:90%;text-align:center}
.gate-title{font-family:var(--fd);font-size:1.2rem;font-weight:700;margin-bottom:8px}
.gate-sub{font-size:.88rem;color:var(--tm);margin-bottom:24px}
.gate-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--bd);background:var(--bg);color:var(--t);font-family:var(--fb);font-size:.9rem;outline:none;margin-bottom:12px;transition:border-color .3s}
.gate-input:focus{border-color:var(--a)}
.gate-btn{width:100%;padding:12px;border-radius:10px;font-size:.92rem}
.gate-error{color:var(--r);font-size:.82rem;margin-top:10px}
.gate-link{font-size:.82rem;color:var(--tm);margin-top:16px;cursor:pointer}
.gate-link:hover{color:var(--a)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bgc);border:1px solid var(--bd);border-radius:16px;padding:28px;width:90%;max-width:560px;max-height:85vh;overflow-y:auto}
.modal-title{font-family:var(--fd);font-size:1.1rem;font-weight:700;margin-bottom:20px}
.fg{margin-bottom:16px}
.fl{display:block;font-size:.78rem;font-weight:600;color:var(--tm);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.fi{width:100%;padding:10px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--bg);color:var(--t);font-family:var(--fb);font-size:.88rem;outline:none;transition:border-color .3s}
.fi:focus{border-color:var(--a)}
textarea.fi{resize:vertical;min-height:80px}
select.fi{cursor:pointer}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fa{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* EMPTY */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:3rem;margin-bottom:16px;opacity:.3}
.empty-t{font-family:var(--fd);font-weight:700;margin-bottom:8px}
.empty-s{font-size:.88rem;color:var(--tm);margin-bottom:20px}

/* FOOTER */
.footer{text-align:center;padding:24px;font-size:.76rem;color:var(--tm);border-top:1px solid var(--bd)}.footer strong{color:var(--t)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:var(--fd);color:var(--a);font-size:1.1rem;font-weight:700}
.spinner{width:24px;height:24px;border:3px solid var(--bd);border-top-color:var(--a);border-radius:50%;animation:spin .8s linear infinite;margin-right:12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SHARE LINK */
.share-box{display:flex;align-items:center;gap:8px;margin-top:12px;padding:10px 14px;background:var(--bg);border:1px solid var(--bd);border-radius:8px}
.share-box input{flex:1;background:transparent;border:none;color:var(--t);font-family:var(--fb);font-size:.82rem;outline:none}
.share-box .btn{flex-shrink:0}
.copied{color:var(--a);font-size:.76rem;margin-top:6px}

/* ANIMATION */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeIn .5s ease both}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}.inner{padding:20px 16px 60px}
  .pj-title{font-size:1.3rem}.gantt-label{width:100px;font-size:.72rem}
  .fr{grid-template-columns:1fr}.pj-dates{flex-direction:column;gap:6px}
  .hdr .brand{font-size:.82rem}
}
</style>
</head>
<body>

<div id="app"><div class="loading"><div class="spinner"></div>Loading portal...</div></div>

<script>
// ═══════════════════════════════════════════════════════
// FIREBASE CONFIG
// ═══════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyCHolstBzyXS__S6q7xeRtk2GxJ4zud0ms",
  authDomain: "dami-portal.firebaseapp.com",
  projectId: "dami-portal",
  storageBucket: "dami-portal.firebasestorage.app",
  messagingSenderId: "935546461",
  appId: "1:935546461:web:84d213cfd58569cf4747b4"
});

const auth = firebase.auth();
const db = firebase.firestore();

// ═══════════════════════════════════════════════════════
// UTILITY FUNCTIONS
// ═══════════════════════════════════════════════════════
const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);
const el = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html) e.innerHTML = html;
  return e;
};

function fmtDate(d) {
  if (!d) return "\u2014";
  return new Date(d + "T00:00:00").toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}
function daysBetween(a, b) { return Math.max(1, Math.round((new Date(b) - new Date(a)) / 86400000)); }
function clampV(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, ''); }
function genId() { return 'id' + Date.now() + Math.random().toString(36).slice(2, 7); }

function sColor(s) { return s === 'completed' ? '#00D4AA' : s === 'in-progress' ? '#FBBF24' : '#8888A0'; }
function sLabel(s) { return s === 'completed' ? 'Complete' : s === 'in-progress' ? 'In Progress' : 'Upcoming'; }
function sIcon(s) { return s === 'completed' ? '\u2713' : s === 'in-progress' ? '\u25D0' : '\u25CB'; }

function getProgress(phases) {
  if (!phases || !phases.length) return 0;
  const t = phases.reduce((s, p) => s + (p.weight || 0), 0);
  const d = phases.filter(p => p.status === 'completed').reduce((s, p) => s + (p.weight || 0), 0);
  const ip = phases.filter(p => p.status === 'in-progress').reduce((s, p) => s + (p.weight || 0) * 0.5, 0);
  return t ? Math.round(((d + ip) / t) * 100) : 0;
}

function badgeHtml(status) {
  const bg = status === 'completed' ? 'rgba(0,212,170,.12)' : status === 'in-progress' ? 'rgba(251,191,36,.12)' : 'rgba(136,136,160,.1)';
  return `<span class="badge" style="background:${bg};color:${sColor(status)}">${sIcon(status)} ${sLabel(status)}</span>`;
}

function progressHtml(pct) {
  return `<div class="prog-sec anim"><div class="prog-top"><span class="prog-label">Overall Progress</span><span class="prog-pct">${pct}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let state = {
  user: null,
  projects: [],
  activeId: null,
  tab: 'updates',
  view: 'loading', // loading, login, admin, client-gate, client
  clientProject: null,
  unsubscribe: null
};

// ═══════════════════════════════════════════════════════
// URL ROUTING
// ═══════════════════════════════════════════════════════
function getUrlProject() {
  const params = new URLSearchParams(window.location.search);
  return params.get('project');
}

function getShareUrl(project) {
  const base = window.location.origin + window.location.pathname;
  return base + '?project=' + slugify(project.title + '-' + project.id.slice(-4));
}

// ═══════════════════════════════════════════════════════
// FIREBASE: DATA OPERATIONS
// ═══════════════════════════════════════════════════════
function listenProjects() {
  if (state.unsubscribe) state.unsubscribe();
  state.unsubscribe = db.collection('projects').orderBy('createdAt', 'desc').onSnapshot(snap => {
    state.projects = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    if (!state.activeId && state.projects.length) state.activeId = state.projects[0].id;
    render();
  }, err => {
    console.error('Firestore error:', err);
  });
}

async function saveProject(data) {
  if (data.id && !data._isNew) {
    const { id, ...rest } = data;
    await db.collection('projects').doc(id).update(rest);
  } else {
    delete data._isNew;
    delete data.id;
    data.createdAt = firebase.firestore.FieldValue.serverTimestamp();
    const ref = await db.collection('projects').add(data);
    state.activeId = ref.id;
  }
}

async function deleteProject(id) {
  await db.collection('projects').doc(id).delete();
  if (state.activeId === id) {
    state.activeId = state.projects.filter(p => p.id !== id)[0]?.id || null;
  }
}

async function loadProjectBySlug(slug) {
  const snap = await db.collection('projects').get();
  for (const doc of snap.docs) {
    const p = { id: doc.id, ...doc.data() };
    const s = slugify(p.title + '-' + p.id.slice(-4));
    if (s === slug) return p;
  }
  return null;
}

// ═══════════════════════════════════════════════════════
// RENDER: VIEWS
// ═══════════════════════════════════════════════════════
function render() {
  const app = $('#app');
  switch (state.view) {
    case 'loading': app.innerHTML = '<div class="loading"><div class="spinner"></div>Loading portal...</div>'; break;
    case 'login': renderLogin(); break;
    case 'admin': renderAdmin(); break;
    case 'client-gate': renderClientGate(); break;
    case 'client': renderClientView(); break;
    default: app.innerHTML = '';
  }
}

// ── LOGIN ──
function renderLogin() {
  $('#app').innerHTML = `
    <div class="gate">
      <div class="gate-card">
        <div class="logo" style="margin:0 auto 20px;width:44px;height:44px;font-size:18px">D</div>
        <div class="gate-title">Admin Login</div>
        <div class="gate-sub">Sign in to manage your projects</div>
        <input class="gate-input" id="login-email" type="email" placeholder="Email address">
        <input class="gate-input" id="login-pw" type="password" placeholder="Password">
        <button class="btn btn-a gate-btn" id="login-btn">Sign In</button>
        <div id="login-err" class="gate-error" style="display:none"></div>
      </div>
    </div>`;

  $('#login-btn').onclick = async () => {
    const email = $('#login-email').value.trim();
    const pw = $('#login-pw').value;
    if (!email || !pw) return;
    try {
      $('#login-btn').textContent = 'Signing in...';
      await auth.signInWithEmailAndPassword(email, pw);
    } catch (e) {
      $('#login-err').style.display = 'block';
      $('#login-err').textContent = e.message.includes('invalid') ? 'Invalid email or password' : e.message;
      $('#login-btn').textContent = 'Sign In';
    }
  };

  $('#login-pw').onkeydown = (e) => { if (e.key === 'Enter') $('#login-btn').click(); };
}

// ── CLIENT GATE (password) ──
function renderClientGate() {
  const p = state.clientProject;
  if (!p) return;
  if (!p.password) { state.view = 'client'; render(); return; }

  $('#app').innerHTML = `
    <div class="gate">
      <div class="gate-card">
        <div class="logo" style="margin:0 auto 20px;width:44px;height:44px;font-size:18px">D</div>
        <div class="gate-title">${p.title}</div>
        <div class="gate-sub">Enter the project password to view progress</div>
        <input class="gate-input" id="gate-pw" type="password" placeholder="Project password">
        <button class="btn btn-a gate-btn" id="gate-btn">View Project</button>
        <div id="gate-err" class="gate-error" style="display:none"></div>
      </div>
    </div>`;

  $('#gate-btn').onclick = () => {
    if ($('#gate-pw').value === p.password) {
      state.view = 'client';
      render();
    } else {
      $('#gate-err').style.display = 'block';
      $('#gate-err').textContent = 'Incorrect password.';
    }
  };
  $('#gate-pw').onkeydown = (e) => { if (e.key === 'Enter') $('#gate-btn').click(); };
}

// ── CLIENT VIEW ──
function renderClientView() {
  const p = state.clientProject;
  if (!p) return;
  const pct = getProgress(p.phases || []);

  $('#app').innerHTML = `
    <div class="hdr">
      <div class="hdr-l"><div class="logo">D</div><div class="brand"><span>Dami</span> Market</div></div>
    </div>
    <div style="max-width:900px;margin:0 auto;padding:32px 28px 60px">
      <div class="anim" style="margin-bottom:32px">
        <div class="pj-badge" style="background:${p.status==='completed'?'rgba(0,212,170,.12)':'rgba(251,191,36,.12)'};color:${sColor(p.status)}">${sIcon(p.status)} ${sLabel(p.status)}</div>
        <div class="pj-title">${p.title}</div>
        <div class="pj-client">For ${p.clientName}</div>
        <div class="pj-desc">${p.description || ''}</div>
        <div class="pj-dates"><span>Started: <strong>${fmtDate(p.startDate)}</strong></span><span>Deadline: <strong>${fmtDate(p.endDate)}</strong></span></div>
      </div>
      ${progressHtml(pct)}
      <div class="tabs" id="client-tabs">
        <button class="tab active" data-tab="updates">Activity Log</button>
        <button class="tab" data-tab="phases">Project Phases</button>
        <button class="tab" data-tab="timeline">Timeline</button>
      </div>
      <div id="client-content"></div>
      <div class="footer">Built with precision by <strong>Dami Market</strong> &mdash; &copy; ${new Date().getFullYear()}</div>
    </div>`;

  state.tab = 'updates';
  renderClientTab();
  $$('#client-tabs .tab').forEach(t => {
    t.onclick = () => {
      $$('#client-tabs .tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      state.tab = t.dataset.tab;
      renderClientTab();
    };
  });
}

function renderClientTab() {
  const p = state.clientProject;
  const cont = $('#client-content');
  if (!cont) return;
  if (state.tab === 'updates') cont.innerHTML = updatesHtml(p, false);
  else if (state.tab === 'phases') cont.innerHTML = phasesHtml(p, false);
  else if (state.tab === 'timeline') cont.innerHTML = timelineHtml(p);
}

// ── ADMIN VIEW ──

  let sidebarItems = '';

    const pp = getProgress(p.phases || []);
    sidebarItems += `

        <div class="pi-title">${p.title}</div>

        <div class="pi-bar"><div class="pi-fill" style="width:${pp}%"></div></div>
        <div class="pi-meta">
          <div class="pi-pct">${pp}%</div>

      </div>`;

          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px">

            <div style="display:flex;gap:6px">
              <button class="btn btn-g btn-s" id="btn-edit-proj">\u270F\uFE0F Edit</button>
              <button class="btn btn-d btn-s" id="btn-del-proj">\uD83D\uDDD1</button>
            </div>
          </div>
          <div class="pj-title">${proj.title}</div>
          <div class="pj-client">Client: ${proj.clientName}</div>
          <div class="pj-desc">${proj.description || ''}</div>
          <div class="pj-dates">
            <span>Start: <strong>${fmtDate(proj.startDate)}</strong></span>
            <span>Deadline: <strong>${fmtDate(proj.endDate)}</strong></span>
            ${proj.password ? '<span style="color:var(--a);font-size:.78rem">\uD83D\uDD12 Password protected</span>' : ''}
          </div>
          <div style="margin-top:16px">
            <label class="fl">Client Share Link</label>

              <input readonly value="${shareUrl}" id="share-url">
              <button class="btn btn-a btn-s" id="btn-copy-link">Copy</button>

          </div>
        </div>

        <div class="tabs" id="admin-tabs">

          <button class="tab ${state.tab==='phases'?'active':''}" data-tab="phases">Project Phases</button>
          <button class="tab ${state.tab==='timeline'?'active':''}" data-tab="timeline">Timeline</button>

        <div class="footer">Built with precision by <strong>Dami Market</strong> &mdash; &copy; ${new Date().getFullYear()}</div>
      </div>`;
  } else {

  }

  $('#app').innerHTML = `
    <div class="hdr">
      <div class="hdr-l"><div class="logo">D</div><div class="brand"><span>Dami</span> Market &mdash; Project Portal</div></div>
      <div class="hdr-r">
        <button class="btn btn-g btn-s" id="btn-logout">Logout</button>
        <button class="btn btn-a btn-s" id="btn-new-proj">+ New Project</button>
      </div>
    </div>
    <div class="layout">
      <div class="sidebar">
        <div class="sb-hdr"><div class="sb-title">Projects (${state.projects.length})</div></div>
        <div class="sb-list">${sidebarItems}</div>
      </div>
      <div class="main">${mainContent}</div>
    </div>`;

  // Bind events
  $('#btn-logout').onclick = () => auth.signOut();
  $('#btn-new-proj').onclick = () => showProjectModal();
  if ($('#btn-new-empty')) $('#btn-new-empty').onclick = () => showProjectModal();

function renderAdminTab() {
  const proj = state.projects.find(p => p.id === state.activeId);
  const cont = $('#admin-content');
  if (!cont || !proj) return;
  if (state.tab === 'updates') {
    cont.innerHTML = updatesHtml(proj, true);
    if ($('#btn-add-update')) $('#btn-add-update').onclick = () => showUpdateModal(proj);
  } else if (state.tab === 'phases') {
    cont.innerHTML = phasesHtml(proj, true);
    if ($('#btn-add-phase')) $('#btn-add-phase').onclick = () => showPhaseModal(proj);
    $$('.card[data-phid]').forEach(c => {
      c.style.cursor = 'pointer';
      c.onclick = () => {
        const ph = proj.phases.find(p => p.id === c.dataset.phid);
        if (ph) showPhaseModal(proj, ph);
      };
    });
  } else if (state.tab === 'timeline') {
    cont.innerHTML = timelineHtml(proj);
  }
}

// ═══════════════════════════════════════════════════════
// HTML GENERATORS
// ═══════════════════════════════════════════════════════
function updatesHtml(proj, isAdmin) {
  const updates = [...(proj.updates || [])].sort((a, b) => b.date.localeCompare(a.date));
  const pm = Object.fromEntries((proj.phases || []).map(p => [p.id, p.title]));
  if (!updates.length) {
    return `<div class="empty"><div class="empty-icon">\uD83D\uDCDD</div><div class="empty-t">No updates yet</div><div class="empty-s">${isAdmin ? 'Add progress updates so your client can see what is happening' : 'Updates will appear here as work progresses'}</div>${isAdmin ? '<button class="btn btn-a" id="btn-add-update">+ Add Update</button>' : ''}</div>`;
  }
  let html = isAdmin ? '<div style="margin-bottom:16px;display:flex;justify-content:flex-end"><button class="btn btn-a btn-s" id="btn-add-update">+ Add Update</button></div>' : '';
  html += '<div class="timeline">';
  updates.forEach((u, i) => {
    html += `<div class="tl-item anim" style="animation-delay:${i*0.05}s">
      <div class="tl-dot" style="border-color:#00D4AA;background:#00D4AA;color:#0A0A0F">\u2713</div>
      <div class="tl-date">${fmtDate(u.date)}</div>
      <div class="tl-title">${u.title}</div>
      <div class="tl-body">${u.description}</div>
      ${u.phase && pm[u.phase] ? `<div class="tl-tag">\u26A1 ${pm[u.phase]}</div>` : ''}
    </div>`;
  });
  html += '</div>';
  return html;
}

function phasesHtml(proj, isAdmin) {
  const ph = proj.phases || [];
  if (!ph.length) {
    return `<div class="empty"><div class="empty-icon">\uD83D\uDCCB</div><div class="empty-t">No phases yet</div><div class="empty-s">Add project phases to break down the work</div>${isAdmin ? '<button class="btn btn-a" id="btn-add-phase">+ Add Phase</button>' : ''}</div>`;
  }
  let html = isAdmin ? '<div style="margin-bottom:16px;display:flex;justify-content:flex-end"><button class="btn btn-a btn-s" id="btn-add-phase">+ Add Phase</button></div>' : '';
  ph.forEach((x, i) => {
    html += `<div class="card anim" style="animation-delay:${i*0.05}s" data-phid="${x.id}">
      <div class="card-top"><div class="card-title">${x.title}</div>${badgeHtml(x.status)}</div>
      <div class="card-body">${x.description}</div>
      ${x.impact ? `<div class="card-impact"><div class="impact-label">Why This Matters</div><div class="impact-text">${x.impact}</div></div>` : ''}
      <div class="card-date">\uD83D\uDCC5 ${fmtDate(x.startDate)} \u2192 ${fmtDate(x.endDate)} <span style="margin-left:auto">Weight: ${x.weight}%</span></div>
    </div>`;
  });
  return html;
}

function timelineHtml(proj) {
  const ph = proj.phases || [];
  if (!ph.length) return '<div class="empty"><div class="empty-icon">\uD83D\uDCCA</div><div class="empty-t">No timeline data</div><div class="empty-s">Add phases with dates to see the timeline</div></div>';
  const dates = ph.flatMap(x => [x.startDate, x.endDate]).filter(Boolean);
  if (dates.length < 2) return '';
  const mn = dates.reduce((a, b) => a < b ? a : b);
  const mx = dates.reduce((a, b) => a > b ? a : b);
  const span = daysBetween(mn, mx);
  const today = new Date().toISOString().slice(0, 10);
  const tp = clampV(daysBetween(mn, today) / span * 100, 0, 100);

  let html = `<div class="anim"><div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--tm);margin-bottom:12px"><span>${fmtDate(mn)}</span><span>Today</span><span>${fmtDate(mx)}</span></div>`;
  html += `<div style="position:relative;margin-bottom:24px"><div style="position:absolute;left:${tp}%;top:-4px;bottom:-4px;width:2px;background:var(--a);opacity:.5;z-index:1"></div>`;
  ph.forEach((x, i) => {
    const left = clampV(daysBetween(mn, x.startDate) / span * 100, 0, 100);
    const width = clampV(daysBetween(x.startDate, x.endDate) / span * 100, 2, 100 - left);
    html += `<div class="gantt-row anim" style="animation-delay:${i*0.05}s"><div class="gantt-label">${x.title}</div><div class="gantt-track"><div class="gantt-bar" style="left:${left}%;width:${width}%;background:${sColor(x.status)};opacity:${x.status==='upcoming'?0.4:1}">${width > 8 ? x.weight + '%' : ''}</div></div></div>`;
  });
  html += '</div>';
  html += '<div style="display:flex;gap:16px;justify-content:center;font-size:.76rem">';
  [['completed','Complete'],['in-progress','In Progress'],['upcoming','Upcoming']].forEach(([s,l]) => {
    html += `<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:3px;background:${sColor(s)};opacity:${s==='upcoming'?0.4:1}"></div><span style="color:var(--tm)">${l}</span></div>`;
  });
  html += '</div></div>';
  return html;
}

// ═══════════════════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════════════════
function showModal(title, bodyHtml, onSave) {
  const ov = el('div', 'overlay');
  ov.innerHTML = `<div class="modal"><div class="modal-title">${title}</div>${bodyHtml}<div class="fa"><button class="btn btn-g btn-s" id="modal-cancel">Cancel</button><button class="btn btn-a btn-s" id="modal-save">Save</button></div></div>`;
  document.body.appendChild(ov);
  ov.onclick = (e) => { if (e.target === ov) ov.remove(); };
  ov.querySelector('#modal-cancel').onclick = () => ov.remove();
  ov.querySelector('#modal-save').onclick = () => {
    onSave(ov);
    ov.remove();
  };
}

function showProjectModal(proj) {
  const p = proj || {};
  const html = `
    <div class="fg"><label class="fl">Client Name</label><input class="fi" id="m-client" value="${p.clientName||''}" placeholder="e.g. Apex Realty Group"></div>
    <div class="fg"><label class="fl">Project Title</label><input class="fi" id="m-title" value="${p.title||''}" placeholder="e.g. CRM & Marketing Automation Setup"></div>
    <div class="fg"><label class="fl">Description</label><textarea class="fi" id="m-desc" placeholder="Brief project scope...">${p.description||''}</textarea></div>
    <div class="fr">
      <div class="fg"><label class="fl">Start Date</label><input type="date" class="fi" id="m-start" value="${p.startDate||''}"></div>
      <div class="fg"><label class="fl">End Date</label><input type="date" class="fi" id="m-end" value="${p.endDate||''}"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Status</label><select class="fi" id="m-status"><option value="in-progress" ${p.status==='in-progress'?'selected':''}>In Progress</option><option value="completed" ${p.status==='completed'?'selected':''}>Completed</option><option value="upcoming" ${p.status==='upcoming'?'selected':''}>Upcoming</option></select></div>
      <div class="fg"><label class="fl">Client Password (optional)</label><input class="fi" id="m-pw" value="${p.password||''}" placeholder="Leave blank for open access"></div>
    </div>`;

  showModal(proj ? 'Edit Project' : 'New Project', html, async (ov) => {
    const data = {
      clientName: ov.querySelector('#m-client').value.trim(),
      title: ov.querySelector('#m-title').value.trim(),
      description: ov.querySelector('#m-desc').value.trim(),
      startDate: ov.querySelector('#m-start').value,
      endDate: ov.querySelector('#m-end').value,
      status: ov.querySelector('#m-status').value,
      password: ov.querySelector('#m-pw').value,
      phases: p.phases || [],
      updates: p.updates || [],
    };
    if (!data.clientName || !data.title) return;
    if (proj) data.id = proj.id;
    else data._isNew = true;
    await saveProject(data);
  });
}

function showPhaseModal(proj, phase) {
  const p = phase || {};
  const html = `
    <div class="fg"><label class="fl">Phase Title</label><input class="fi" id="m-ph-title" value="${p.title||''}" placeholder="e.g. CRM & Pipeline Setup"></div>
    <div class="fg"><label class="fl">Description</label><textarea class="fi" id="m-ph-desc">${p.description||''}</textarea></div>
    <div class="fg"><label class="fl">Impact on Project Success</label><textarea class="fi" id="m-ph-impact" placeholder="Why this matters...">${p.impact||''}</textarea></div>
    <div class="fr">
      <div class="fg"><label class="fl">Status</label><select class="fi" id="m-ph-status"><option value="upcoming" ${p.status==='upcoming'?'selected':''}>Upcoming</option><option value="in-progress" ${p.status==='in-progress'?'selected':''}>In Progress</option><option value="completed" ${p.status==='completed'?'selected':''}>Completed</option></select></div>
      <div class="fg"><label class="fl">Weight (%)</label><input type="number" class="fi" id="m-ph-weight" value="${p.weight||15}" min="1" max="100"></div>
    </div>
    <div class="fr">
      <div class="fg"><label class="fl">Start</label><input type="date" class="fi" id="m-ph-start" value="${p.startDate||''}"></div>
      <div class="fg"><label class="fl">End</label><input type="date" class="fi" id="m-ph-end" value="${p.endDate||''}"></div>
    </div>`;

  showModal(phase ? 'Edit Phase' : 'Add Phase', html, async (ov) => {
    const phData = {
      id: p.id || genId(),
      title: ov.querySelector('#m-ph-title').value.trim(),
      description: ov.querySelector('#m-ph-desc').value.trim(),
      impact: ov.querySelector('#m-ph-impact').value.trim(),
      status: ov.querySelector('#m-ph-status').value,
      weight: parseInt(ov.querySelector('#m-ph-weight').value) || 15,
      startDate: ov.querySelector('#m-ph-start').value,
      endDate: ov.querySelector('#m-ph-end').value,
    };
    if (!phData.title) return;
    const phases = [...(proj.phases || [])];
    const idx = phases.findIndex(x => x.id === phData.id);
    if (idx >= 0) phases[idx] = phData; else phases.push(phData);
    await db.collection('projects').doc(proj.id).update({ phases });
  });
}

function showUpdateModal(proj) {
  const phases = proj.phases || [];
  let phOpts = phases.map(p => `<option value="${p.id}">${p.title}</option>`).join('');
  const html = `
    <div class="fr">
      <div class="fg"><label class="fl">Date</label><input type="date" class="fi" id="m-up-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="fg"><label class="fl">Related Phase</label><select class="fi" id="m-up-phase">${phOpts}</select></div>
    </div>
    <div class="fg"><label class="fl">Update Title</label><input class="fi" id="m-up-title" placeholder="e.g. Speed-to-Lead Automation Live"></div>
    <div class="fg"><label class="fl">Description</label><textarea class="fi" id="m-up-desc" placeholder="What was accomplished..." style="min-height:120px"></textarea></div>`;

  showModal('Add Progress Update', html, async (ov) => {
    const upData = {
      id: genId(),
      date: ov.querySelector('#m-up-date').value,
      title: ov.querySelector('#m-up-title').value.trim(),
      description: ov.querySelector('#m-up-desc').value.trim(),
      phase: ov.querySelector('#m-up-phase').value,
    };
    if (!upData.title || !upData.description) return;
    const updates = [...(proj.updates || []), upData];
    await db.collection('projects').doc(proj.id).update({ updates });
  });
}

// ═══════════════════════════════════════════════════════
// INIT — Route based on URL and auth state
// ═══════════════════════════════════════════════════════
const urlProject = getUrlProject();

if (urlProject) {
  // Client view — no auth needed
  (async () => {
    const p = await loadProjectBySlug(urlProject);
    if (p) {
      state.clientProject = p;
      state.view = p.password ? 'client-gate' : 'client';
    } else {
      state.view = 'client';
      state.clientProject = { title: 'Not Found', clientName: '', description: 'This project link is invalid or has been removed.', status: 'upcoming', phases: [], updates: [], startDate: '', endDate: '' };
    }
    render();
  })();
} else {
  // Admin view — auth required
  auth.onAuthStateChanged(user => {
    state.user = user;
    if (user) {
      state.view = 'admin';
      listenProjects();
    } else {
      state.view = 'login';
      if (state.unsubscribe) { state.unsubscribe(); state.unsubscribe = null; }
      state.projects = [];
      render();
    }
  });
}
</script>
