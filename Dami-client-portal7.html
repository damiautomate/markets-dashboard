const genId=()=>'id'+Date.now()+Math.random().toString(36).slice(2,7);
const sColor=s=>s==='completed'?'#00D4AA':s==='in-progress'?'#FBBF24':'#8888A0';
const sLabel=s=>s==='completed'?'Complete':s==='in-progress'?'In Progress':'Upcoming';
const sIcon=s=>s==='completed'?'\u2713':s==='in-progress'?'\u25D0':'\u25CB';
function getProgress(ph){if(!ph||!ph.length)return 0;const t=ph.reduce((s,p)=>s+(p.weight||0),0),d=ph.filter(p=>p.status==='completed').reduce((s,p)=>s+(p.weight||0),0),ip=ph.filter(p=>p.status==='in-progress').reduce((s,p)=>s+(p.weight||0)*.5,0);return t?Math.round(((d+ip)/t)*100):0}
const badgeH=s=>{const bg=s==='completed'?'rgba(0,212,170,.12)':s==='in-progress'?'rgba(251,191,36,.12)':'rgba(136,136,160,.1)';return`<span class="badge" style="background:${bg};color:${sColor(s)}">${sIcon(s)} ${sLabel(s)}</span>`};
const progH=pct=>`<div class="prog-sec anim"><div class="prog-top"><span class="prog-label">Overall Progress</span><span class="prog-pct">${pct}%</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div></div>`;

function fmtTimestamp(ts){
  if(!ts)return{display:'',ago:''};
  const d=new Date(ts);if(isNaN(d))return{display:fmtDate(ts),ago:''};
  const display=d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})+' at '+d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",hour12:true});
  const now=Date.now(),diff=now-d.getTime(),secs=Math.floor(diff/1000),mins=Math.floor(secs/60),hrs=Math.floor(mins/60),days=Math.floor(hrs/24);
  let ago='';if(secs<60)ago='just now';else if(mins<60)ago=mins+'m ago';else if(hrs<24)ago=hrs+'h ago';else if(days===1)ago='yesterday';else if(days<30)ago=days+'d ago';
  return{display,ago};
}

// ═══ REACTIONS — collapsed when one is selected ═══
function reactionsH(reactions,updateId,projId,isAdmin){
  const r=reactions||{};
  const userId=isAdmin?'__admin__':getClientName();
  const emojis=[['thumbsUp','\uD83D\uDC4D'],['heart','\u2764\uFE0F'],['celebrate','\uD83C\uDF89']];
  const norm=k=>{const v=r[k];if(Array.isArray(v))return v;if(typeof v==='number'&&v>0)return Array.from({length:v},(_,i)=>({user:'anon'+i}));return[]};
  let currentEmoji=null;
  emojis.forEach(([key])=>{if(norm(key).some(x=>x.user===userId))currentEmoji=key});
  let h='<div class="reactions">';
  emojis.forEach(([key,emoji])=>{
    const count=norm(key).length;
    const isActive=currentEmoji===key;
    // If user has selected one, hide the others
    const isHidden=currentEmoji&&!isActive;
    h+=`<button class="react-btn ${isActive?'active':''} ${isHidden?'hidden':''}" data-emoji="${key}" data-uid="${updateId}" data-proj="${projId}">${emoji}${count>0?' '+count:''}</button>`;
  });
  h+='</div>';return h;
}

// ═══ COMMENTS — icon only when 0, icon+count when >0 ═══
function commentsH(items,parentType,parentId,projId,isAdmin){
  const list=(items||[]).map(c=>{
    const cls=c.role==='admin'?'admin':'client';
    return`<div class="comment"><div class="comment-avatar ${cls}">${(c.author||'?')[0].toUpperCase()}</div><div class="comment-content"><div class="comment-meta"><strong>${escH(c.author||'Unknown')}</strong> &middot; ${fmtDate(c.date)}</div><div class="comment-text">${escH(c.text)}</div></div></div>`;
  }).join('');
  const count=(items||[]).length;
  const label=count>0?`\uD83D\uDCAC ${count}`:`\uD83D\uDCAC`;
  return`<div class="comments-section"><button class="toggle-comments" data-type="${parentType}" data-id="${parentId}">${label}</button><div class="comments-body" data-for="${parentType}-${parentId}" style="display:none">${list}<div class="comment-input-row"><input class="comment-input" data-type="${parentType}" data-id="${parentId}" data-proj="${projId}" placeholder="Write a comment..."><button class="comment-send" data-type="${parentType}" data-id="${parentId}" data-proj="${projId}">Send</button></div></div></div>`;
}

// ═══ COMPACT GALLERY ═══
function galleryH(files,updateId){
  if(!files||!files.length)return'';
  if(files.length===1){
    const f=files[0];const isV=f.type&&f.type.startsWith('video');
    return`<div class="tl-gallery">${isV?`<video class="tl-gallery-thumb" preload="metadata" data-gid="${updateId}"><source src="${f.url}" type="${f.type}"></video>`:`<img class="tl-gallery-thumb" src="${f.url}" data-gid="${updateId}">`}</div>`;
  }
  if(files.length===2){
    return`<div class="tl-gallery">${files.map((f,i)=>`<img class="tl-gallery-thumb" src="${f.url}" data-gid="${updateId}" data-gi="${i}">`).join('')}</div>`;
  }
  // 3+ files: show first 2 + "+N more"
  const extra=files.length-1;
  return`<div class="tl-gallery"><img class="tl-gallery-thumb" src="${files[0].url}" data-gid="${updateId}" data-gi="0"><div class="tl-gallery-more" data-gid="${updateId}" data-gi="1">+${extra} more</div></div>`;
}

// ═══ BIND INTERACTIONS ═══
function bindInteractions(projId,isAdmin){
  $$('.toggle-comments').forEach(btn=>{btn.onclick=()=>{const b=$(`[data-for="${btn.dataset.type}-${btn.dataset.id}"]`);if(b)b.style.display=b.style.display==='none'?'block':'none'}});
  $$('.comment-send').forEach(btn=>{
    btn.onclick=async()=>{
      const input=btn.previousElementSibling;const text=input.value.trim();if(!text)return;
      const role=isAdmin?'admin':'client';const author=isAdmin?'Damilare':getClientName();if(!author)return;
      const comment={id:genId(),text,author,role,date:new Date().toISOString().slice(0,10)};
      btn.textContent='...';btn.disabled=true;
      try{const proj=isAdmin?state.projects.find(p=>p.id===projId):state.clientProject;
        if(btn.dataset.type==='update'){const ups=[...(proj.updates||[])];const idx=ups.findIndex(u=>u.id===btn.dataset.id);if(idx>=0){ups[idx].comments=[...(ups[idx].comments||[]),comment];await db.collection('projects').doc(projId).update({updates:ups});if(!isAdmin){state.clientProject.updates=ups;renderCTab()}else render()}}
        else if(btn.dataset.type==='phase'){const phs=[...(proj.phases||[])];const idx=phs.findIndex(p=>p.id===btn.dataset.id);if(idx>=0){phs[idx].comments=[...(phs[idx].comments||[]),comment];await db.collection('projects').doc(projId).update({phases:phs});if(!isAdmin){state.clientProject.phases=phs;renderCTab()}else render()}}
      }catch(e){btn.textContent='Send';btn.disabled=false}
    }
  });
  $$('.react-btn').forEach(btn=>{
    btn.onclick=async()=>{
      let userId=isAdmin?'__admin__':getClientName();if(!userId&&!isAdmin)return;
      const proj=isAdmin?state.projects.find(p=>p.id===projId):state.clientProject;
      const ups=[...(proj.updates||[])];const idx=ups.findIndex(u=>u.id===btn.dataset.uid);if(idx<0)return;
      const r=JSON.parse(JSON.stringify(ups[idx].reactions||{}));
      ['thumbsUp','heart','celebrate'].forEach(k=>{if(!Array.isArray(r[k]))r[k]=[]});
      ['thumbsUp','heart','celebrate'].forEach(k=>{r[k]=r[k].filter(x=>x.user!==userId)});
      if(!btn.classList.contains('active')){r[btn.dataset.emoji].push({user:userId})}
      ups[idx].reactions=r;
      await db.collection('projects').doc(projId).update({updates:ups});
      if(!isAdmin){state.clientProject.updates=ups;renderCTab()}else render();
    }
  });
  // Gallery clicks
  $$('.tl-gallery-thumb,.tl-gallery-more').forEach(el=>{
    el.onclick=e=>{
      e.stopPropagation();const uid=el.dataset.gid;const gi=parseInt(el.dataset.gi||0);
      const proj=isAdmin?state.projects.find(p=>p.id===projId):state.clientProject;
      const u=(proj.updates||[]).find(u=>u.id===uid);
      if(u&&u.files)showGallery(u.files,gi);
    }
  });
  // Edit update buttons (admin only)
  $$('.tl-edit-btn').forEach(btn=>{
    btn.onclick=e=>{
      e.stopPropagation();const proj=state.projects.find(p=>p.id===projId);
      const u=(proj.updates||[]).find(u=>u.id===btn.dataset.uid);
      if(u)showUpdateModal(proj,u);
    }
  });
}

// ═══ HTML GENERATORS ═══
function updatesH(proj,isAdmin){

  const pm=Object.fromEntries((proj.phases||[]).map(p=>[p.id,p.title]));
  if(!ups.length)return`<div class="empty"><div class="empty-icon">\uD83D\uDCDD</div><div class="empty-t">No updates yet</div><div class="empty-s">${isAdmin?'Add progress updates for your client':'Updates will appear as work progresses'}</div>${isAdmin?'<button class="btn btn-a" id="btn-au">+ Add Update</button>':''}</div>`;
  let h=isAdmin?'<div style="margin-bottom:14px;display:flex;justify-content:flex-end"><button class="btn btn-a btn-s" id="btn-au">+ Add Update</button></div>':'';
  h+='<div class="timeline">';
  ups.forEach((u,i)=>{
    const ts=fmtTimestamp(u.timestamp||u.date);
    const editedTs=u.editedAt?fmtTimestamp(u.editedAt):null;
    const editBtn=isAdmin?`<button class="tl-edit-btn" data-uid="${u.id}">\u270F\uFE0F</button>`:'';

      <div class="tl-date">${ts.display}${ts.ago?` <span class="tl-ago">&middot; ${ts.ago}</span>`:''}</div>
      ${editedTs?`<div class="tl-edited">Edited &middot; ${editedTs.display}</div>`:''}
      <div class="tl-title-row"><div class="tl-title">${escH(u.title)}</div>${editBtn}</div>
      <div class="tl-body">${escH(u.description)}</div>
      ${galleryH(u.files,u.id)}
      ${u.phase&&pm[u.phase]?`<div class="tl-tag">\u26A1 ${escH(pm[u.phase])}</div>`:''}
      ${reactionsH(u.reactions,u.id,proj.id,isAdmin)}
      ${commentsH(u.comments,'update',u.id,proj.id,isAdmin)}

function timelineH(proj){
  const ph=proj.phases||[];if(!ph.length)return'<div class="empty"><div class="empty-icon">\uD83D\uDCCA</div><div class="empty-t">No timeline data</div></div>';
  const ds=[proj.startDate,proj.endDate,...ph.flatMap(x=>[x.startDate,x.endDate])].filter(Boolean);if(ds.length<2)return'';
  const mn=ds.reduce((a,b)=>a<b?a:b),mx=ds.reduce((a,b)=>a>b?a:b);
  const sp=daysBetween(mn,mx),today=new Date().toISOString().slice(0,10),tp=clampV(daysBetween(mn,today)/sp*100,0,100);
  let h=`<div class="anim"><div style="display:flex;justify-content:space-between;font-size:.7rem;color:var(--tm);margin-bottom:12px"><span>${fmtDate(mn)}</span><span>Today</span><span>${fmtDate(mx)}</span></div><div style="position:relative;margin-bottom:24px"><div style="position:absolute;left:${tp}%;top:-4px;bottom:-4px;width:2px;background:var(--a);opacity:.5;z-index:1"></div>`;
  ph.forEach((x,i)=>{const l=clampV(daysBetween(mn,x.startDate)/sp*100,0,100),w=clampV(daysBetween(x.startDate,x.endDate)/sp*100,2,100-l);h+=`<div class="gantt-row anim" style="animation-delay:${i*.04}s"><div class="gantt-label">${escH(x.title)}</div><div class="gantt-track"><div class="gantt-bar" style="left:${l}%;width:${w}%;background:${sColor(x.status)};opacity:${x.status==='upcoming'?.4:1}">${w>8?x.weight+'%':''}</div></div></div>`});
  h+='</div><div style="display:flex;gap:14px;justify-content:center;font-size:.74rem;flex-wrap:wrap">';
  [['completed','Complete'],['in-progress','In Progress'],['upcoming','Upcoming']].forEach(([s,l])=>{h+=`<div style="display:flex;align-items:center;gap:5px"><div style="width:10px;height:10px;border-radius:3px;background:${sColor(s)};opacity:${s==='upcoming'?.4:1}"></div><span style="color:var(--tm)">${l}</span></div>`});
  h+='</div></div>';return h;
}

function extBannerH(proj,isAdmin){const ext=proj.extensionRequest;if(!ext||ext.dismissed)return'';const st=ext.status||'pending';let title='',actions='',close='';if(st==='pending'){title='\u23F0 Extension Requested';actions=isAdmin?'<span style="font-size:.78rem;color:var(--y)">Waiting for client...</span>':`<button class="btn btn-a btn-s" id="ext-accept">Accept</button><button class="btn btn-d btn-s" id="ext-reject">Decline</button>`}else{title=st==='accepted'?'\u2713 Extension Accepted':'\u2717 Extension Declined';close='<button class="ext-close" id="ext-dismiss">&times;</button>';actions=''}return`<div class="ext-banner ${st} anim">${close}<div class="ext-banner-title">${title}</div><div class="ext-banner-body"><strong>New deadline:</strong> ${fmtDate(ext.newDate)}<br><strong>Reason:</strong> ${escH(ext.reason)}</div><div style="display:flex;gap:8px;flex-wrap:wrap">${actions}</div></div>`}

// ═══ CLIENT VIEW ═══
function renderClientView(){
  const p=state.clientProject;if(!p)return;const pct=getProgress(p.phases||[]);
  const uCt=(p.updates||[]).length,pCt=(p.phases||[]).length;
  $('#app').innerHTML=`<div class="hdr"><div class="hdr-l"><div class="logo">D</div><div class="brand"><span>Dami</span> Market</div></div><div class="hdr-r">${themeToggleH}<button class="btn btn-g btn-s" id="btn-refresh">\u21BB Refresh</button></div></div><div style="max-width:900px;margin:0 auto;padding:28px 20px 60px"><div class="anim" style="margin-bottom:28px"><div class="pj-badge" style="background:${p.status==='completed'?'rgba(0,212,170,.12)':'rgba(251,191,36,.12)'};color:${sColor(p.status)}">${sIcon(p.status)} ${sLabel(p.status)}</div><div class="pj-title">${escH(p.title)}</div><div class="pj-client">For ${escH(p.clientName)}</div><div class="pj-desc">${escH(p.description||'')}</div><div class="pj-dates"><span>Started: <strong>${fmtDate(p.startDate)}</strong></span><span>Deadline: <strong>${fmtDate(p.endDate)}</strong></span></div></div>${extBannerH(p,false)}${progH(pct)}<div class="tabs" id="ctabs"><button class="tab active" data-tab="updates">${tabLabel('Activity Log',uCt)}</button><button class="tab" data-tab="phases">${tabLabel('Project Phases',pCt)}</button><button class="tab" data-tab="timeline">Timeline</button></div><div id="ccont"></div><div class="footer">Built with precision by <strong>Dami Market</strong> &mdash; &copy; ${new Date().getFullYear()}</div></div>`;
  $('#btn-refresh').onclick=async()=>{$('#btn-refresh').textContent='\u21BB ...';const slug=getUrlP();if(slug){const fresh=await loadProjectBySlug(slug);if(fresh)state.clientProject=fresh}renderClientView()};
  if($('#ext-accept'))$('#ext-accept').onclick=async()=>{const ext={...p.extensionRequest,status:'accepted'};const phs=[...(p.phases||[])];if(phs.length)phs[phs.length-1].endDate=ext.newDate;await db.collection('projects').doc(p.id).update({extensionRequest:ext,endDate:ext.newDate,phases:phs});p.extensionRequest=ext;p.endDate=ext.newDate;p.phases=phs;renderClientView()};
  if($('#ext-reject'))$('#ext-reject').onclick=async()=>{const ext={...p.extensionRequest,status:'rejected'};await db.collection('projects').doc(p.id).update({extensionRequest:ext});p.extensionRequest=ext;renderClientView()};
  if($('#ext-dismiss'))$('#ext-dismiss').onclick=async()=>{const ext={...p.extensionRequest,dismissed:true};await db.collection('projects').doc(p.id).update({extensionRequest:ext});p.extensionRequest=ext;renderClientView()};
  state.tab='updates';renderCTab();
  $$('#ctabs .tab').forEach(t=>{t.onclick=()=>{$$('#ctabs .tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');state.tab=t.dataset.tab;renderCTab()}});
}
function renderCTab(){const p=state.clientProject,c=$('#ccont');if(!c)return;if(state.tab==='updates')c.innerHTML=updatesH(p,false);else if(state.tab==='phases')c.innerHTML=phasesH(p,false);else c.innerHTML=timelineH(p);bindInteractions(p.id,false)}

// ═══ ADMIN VIEW ═══
function renderAdmin(){
  const proj=state.projects.find(p=>p.id===state.activeId);let sb='';
  state.projects.forEach(p=>{const pp=getProgress(p.phases||[]);sb+=`<div class="pi ${state.activeId===p.id?'active':''}" data-id="${p.id}"><div class="pi-title">${escH(p.title)}</div><div class="pi-client">${escH(p.clientName)}</div><div class="pi-bar"><div class="pi-fill" style="width:${pp}%"></div></div><div class="pi-meta"><div class="pi-pct">${pp}%</div><div class="dot-status"><span class="dot" style="background:${sColor(p.status)}"></span>${sLabel(p.status)}</div></div></div>`});
  let mc='';
  if(proj){const pct=getProgress(proj.phases||[]),su=getShareUrl(proj);
    const uCt=(proj.updates||[]).length,pCt=(proj.phases||[]).length;
    mc=`<div class="inner"><div class="anim" style="margin-bottom:28px"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px"><div class="pj-badge" style="background:${proj.status==='completed'?'rgba(0,212,170,.12)':proj.status==='in-progress'?'rgba(251,191,36,.12)':'rgba(136,136,160,.1)'};color:${sColor(proj.status)}">${sIcon(proj.status)} ${sLabel(proj.status)}</div><div style="display:flex;gap:6px;flex-wrap:wrap"><button class="btn btn-y btn-s" id="btn-ext">\u23F0 Extension</button><button class="btn btn-g btn-s" id="btn-ed">\u270F\uFE0F Edit</button><button class="btn btn-d btn-s" id="btn-del">\uD83D\uDDD1</button></div></div><div class="pj-title">${escH(proj.title)}</div><div class="pj-client">Client: ${escH(proj.clientName)}</div><div class="pj-desc">${escH(proj.description||'')}</div><div class="pj-dates"><span>Start: <strong>${fmtDate(proj.startDate)}</strong></span><span>Deadline: <strong>${fmtDate(proj.endDate)}</strong></span>${proj.password?'<span style="color:var(--a);font-size:.76rem">\uD83D\uDD12 Protected</span>':''}</div><div style="margin-top:14px"><label class="fl">Client Share Link</label><div class="share-box"><input readonly value="${su}" id="surl"><button class="btn btn-a btn-s" id="btn-cp">Copy</button></div><div id="cpmsg" class="copied" style="display:none">Copied!</div></div></div>${extBannerH(proj,true)}${progH(pct)}<div class="tabs" id="atabs"><button class="tab ${state.tab==='updates'?'active':''}" data-tab="updates">${tabLabel('Activity Log',uCt)}</button><button class="tab ${state.tab==='phases'?'active':''}" data-tab="phases">${tabLabel('Project Phases',pCt)}</button><button class="tab ${state.tab==='timeline'?'active':''}" data-tab="timeline">Timeline</button></div><div id="acont"></div><div class="footer">Built with precision by <strong>Dami Market</strong> &mdash; &copy; ${new Date().getFullYear()}</div></div>`}
  else mc=`<div class="inner"><div class="empty"><div class="empty-icon">\uD83D\uDE80</div><div class="empty-t">Welcome to Dami Market Project Portal</div><div class="empty-s">Create your first project</div><button class="btn btn-a" id="btn-ne">+ Create Project</button></div></div>`;
  $('#app').innerHTML=`<div class="hdr"><div class="hdr-l"><button class="hamburger" id="ham"><span></span><span></span><span></span></button><div class="logo">D</div><div class="brand"><span>Dami</span> Market</div></div><div class="hdr-r">${themeToggleH}<button class="btn btn-g btn-s" id="btn-lo">Logout</button><button class="btn btn-a btn-s" id="btn-np">+ New</button></div></div><div class="mobile-drawer" id="mdrawer">${sb}</div><div class="layout"><div class="sidebar"><div class="sb-hdr"><div class="sb-title">Projects (${state.projects.length})</div></div><div class="sb-list">${sb}</div></div><div class="main">${mc}</div></div>`;
  $('#btn-lo').onclick=()=>auth.signOut();$('#btn-np').onclick=()=>showProjectModal();if($('#btn-ne'))$('#btn-ne').onclick=()=>showProjectModal();
  $('#ham').onclick=()=>{state.mobileOpen=!state.mobileOpen;$('#mdrawer').classList.toggle('open',state.mobileOpen)};
  $$('.pi').forEach(it=>{it.onclick=()=>{state.activeId=it.dataset.id;state.tab='updates';state.mobileOpen=false;if($('#mdrawer'))$('#mdrawer').classList.remove('open');render()}});
  if(proj){
    $('#btn-ed').onclick=()=>showProjectModal(proj);$('#btn-del').onclick=async()=>{if(confirm('Delete?'))await deleteProject(proj.id)};
    $('#btn-cp').onclick=()=>{navigator.clipboard.writeText($('#surl').value);$('#cpmsg').style.display='block';setTimeout(()=>{if($('#cpmsg'))$('#cpmsg').style.display='none'},2000)};
    $('#btn-ext').onclick=()=>showExtModal(proj);
    if($('#ext-dismiss'))$('#ext-dismiss').onclick=async()=>{await db.collection('projects').doc(proj.id).update({extensionRequest:{...proj.extensionRequest,dismissed:true}})};
    renderATab();$$('#atabs .tab').forEach(t=>{t.onclick=()=>{$$('#atabs .tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');state.tab=t.dataset.tab;renderATab()}});
  }
}
function renderATab(){
  const proj=state.projects.find(p=>p.id===state.activeId),c=$('#acont');if(!c||!proj)return;
  if(state.tab==='updates'){c.innerHTML=updatesH(proj,true);if($('#btn-au'))$('#btn-au').onclick=()=>showUpdateModal(proj)}
  else if(state.tab==='phases'){c.innerHTML=phasesH(proj,true);if($('#btn-ap'))$('#btn-ap').onclick=()=>showPhaseModal(proj);$$('.card[data-phid]').forEach(cd=>{cd.style.cursor='pointer';cd.onclick=e=>{if(e.target.closest('.comments-section'))return;const ph=proj.phases.find(p=>p.id===cd.dataset.phid);if(ph)showPhaseModal(proj,ph)}})}
  else c.innerHTML=timelineH(proj);
  bindInteractions(proj.id,true);
}

// ═══ MODALS ═══
function showModal(title,body,onSave,saveLabel){const ov=document.createElement('div');ov.className='overlay';ov.innerHTML=`<div class="modal"><div class="modal-title">${title}</div>${body}<div class="fa"><button class="btn btn-g btn-s" id="mc">Cancel</button><button class="btn btn-a btn-s" id="ms">${saveLabel||'Save'}</button></div></div>`;document.body.appendChild(ov);ov.onclick=e=>{if(e.target===ov)ov.remove()};ov.querySelector('#mc').onclick=()=>ov.remove();ov.querySelector('#ms').onclick=()=>onSave(ov);return ov}

function showProjectModal(proj){const p=proj||{};showModal(proj?'Edit Project':'New Project',`<div class="fg"><label class="fl">Client Name</label><input class="fi" id="mc1" value="${escH(p.clientName||'')}"></div><div class="fg"><label class="fl">Project Title</label><input class="fi" id="mc2" value="${escH(p.title||'')}"></div><div class="fg"><label class="fl">Description</label><textarea class="fi" id="mc3">${escH(p.description||'')}</textarea></div><div class="fr"><div class="fg"><label class="fl">Start</label><input type="date" class="fi" id="mc4" value="${p.startDate||''}"></div><div class="fg"><label class="fl">End</label><input type="date" class="fi" id="mc5" value="${p.endDate||''}"></div></div><div class="fr"><div class="fg"><label class="fl">Status</label><select class="fi" id="mc6"><option value="in-progress" ${p.status==='in-progress'?'selected':''}>In Progress</option><option value="completed" ${p.status==='completed'?'selected':''}>Completed</option><option value="upcoming" ${p.status==='upcoming'?'selected':''}>Upcoming</option></select></div><div class="fg"><label class="fl">Client Password</label><input class="fi" id="mc7" value="${p.password||''}" placeholder="Optional"></div></div>`,async ov=>{const d={clientName:ov.querySelector('#mc1').value.trim(),title:ov.querySelector('#mc2').value.trim(),description:ov.querySelector('#mc3').value.trim(),startDate:ov.querySelector('#mc4').value,endDate:ov.querySelector('#mc5').value,status:ov.querySelector('#mc6').value,password:ov.querySelector('#mc7').value,phases:p.phases||[],updates:p.updates||[],extensionRequest:p.extensionRequest||null};if(!d.clientName||!d.title)return;if(proj)d.id=proj.id;else d._isNew=true;await saveProject(d);ov.remove()})}

function showPhaseModal(proj,phase){const p=phase||{};showModal(phase?'Edit Phase':'Add Phase',`<div class="fg"><label class="fl">Phase Title</label><input class="fi" id="mp1" value="${escH(p.title||'')}"></div><div class="fg"><label class="fl">Description</label><textarea class="fi" id="mp2">${escH(p.description||'')}</textarea></div><div class="fg"><label class="fl">Impact</label><textarea class="fi" id="mp3">${escH(p.impact||'')}</textarea></div><div class="fr"><div class="fg"><label class="fl">Status</label><select class="fi" id="mp4"><option value="upcoming" ${p.status==='upcoming'?'selected':''}>Upcoming</option><option value="in-progress" ${p.status==='in-progress'?'selected':''}>In Progress</option><option value="completed" ${p.status==='completed'?'selected':''}>Completed</option></select></div><div class="fg"><label class="fl">Weight (%)</label><input type="number" class="fi" id="mp5" value="${p.weight||15}"></div></div><div class="fr"><div class="fg"><label class="fl">Start</label><input type="date" class="fi" id="mp6" value="${p.startDate||''}"></div><div class="fg"><label class="fl">End</label><input type="date" class="fi" id="mp7" value="${p.endDate||''}"></div></div>`,async ov=>{const d={id:p.id||genId(),title:ov.querySelector('#mp1').value.trim(),description:ov.querySelector('#mp2').value.trim(),impact:ov.querySelector('#mp3').value.trim(),status:ov.querySelector('#mp4').value,weight:parseInt(ov.querySelector('#mp5').value)||15,startDate:ov.querySelector('#mp6').value,endDate:ov.querySelector('#mp7').value,comments:p.comments||[]};if(!d.title)return;const phs=[...(proj.phases||[])];const idx=phs.findIndex(x=>x.id===d.id);if(idx>=0)phs[idx]=d;else phs.push(d);await db.collection('projects').doc(proj.id).update({phases:phs});ov.remove()})}

// ═══ UPDATE MODAL — supports create AND edit, file accumulation ═══
function showUpdateModal(proj,existingUpdate){
  const isEdit=!!existingUpdate;
  const eu=existingUpdate||{};
  const phs=proj.phases||[];
  let opts=phs.map(p=>`<option value="${p.id}" ${eu.phase===p.id?'selected':''}>${escH(p.title)}</option>`).join('');
  // Accumulated files tracker
  let accFiles=[...(eu.files||[])];// already uploaded files (have .url)
  let newFiles=[];// local File objects to upload

  const ov=showModal(isEdit?'Edit Update':'Add Progress Update',`
    <div class="fr"><div class="fg"><label class="fl">Date</label><input type="date" class="fi" id="mu1" value="${eu.date||new Date().toISOString().slice(0,10)}"></div><div class="fg"><label class="fl">Phase</label><select class="fi" id="mu2">${opts}</select></div></div>
    <div class="fg"><label class="fl">Title</label><input class="fi" id="mu3" value="${escH(eu.title||'')}"></div>
    <div class="fg"><label class="fl">Description</label><textarea class="fi" id="mu4" style="min-height:100px">${escH(eu.description||'')}</textarea></div>
    <div class="fg"><label class="fl">Attach Files</label>
      <div class="file-upload" id="fu"><div style="font-size:.82rem;color:var(--tm)">Drop files or <strong style="color:var(--a)">click to browse</strong></div><input type="file" id="fu-input" multiple accept="image/*,video/*"></div>
      <div class="file-preview" id="fu-preview"></div>
      <div class="upload-progress" id="fu-prog" style="display:none"><div class="upload-progress-fill" id="fu-fill"></div></div>
    </div>`,async ov=>{
      const title=ov.querySelector('#mu3').value.trim(),desc=ov.querySelector('#mu4').value.trim();
      if(!title||!desc)return;
      const btn=ov.querySelector('#ms');btn.textContent='Saving...';btn.disabled=true;
      // Upload new files
      const prog=ov.querySelector('#fu-prog'),fill=ov.querySelector('#fu-fill');
      const uploaded=[...accFiles];
      if(newFiles.length){prog.style.display='block';for(let i=0;i<newFiles.length;i++){fill.style.width=((i/newFiles.length)*100)+'%';try{const url=await uploadFile(newFiles[i]);uploaded.push({url,type:newFiles[i].type,name:newFiles[i].name})}catch(e){}}fill.style.width='100%'}
      if(isEdit){
        const ups=[...(proj.updates||[])];const idx=ups.findIndex(u=>u.id===eu.id);
        if(idx>=0){ups[idx]={...ups[idx],date:ov.querySelector('#mu1').value,title,description:desc,phase:ov.querySelector('#mu2').value,files:uploaded,editedAt:new Date().toISOString()};
        await db.collection('projects').doc(proj.id).update({updates:ups})}
      }else{
        const up={id:genId(),date:ov.querySelector('#mu1').value,timestamp:new Date().toISOString(),title,description:desc,phase:ov.querySelector('#mu2').value,files:uploaded,comments:[],reactions:{}};
        await db.collection('projects').doc(proj.id).update({updates:[...(proj.updates||[]),up]});
      }
      ov.remove();
    },isEdit?'Save Changes':'Save Update');

  function renderPreview(){
    const prev=ov.querySelector('#fu-preview');if(!prev)return;
    let h='';
    // Existing uploaded files
    accFiles.forEach((f,i)=>{
      h+=`<div class="file-preview-item"><img src="${f.url}" style="height:60px"><button class="file-preview-x" data-type="acc" data-idx="${i}">&times;</button></div>`;
    });
    // New local files
    newFiles.forEach((f,i)=>{
      h+=`<div class="file-preview-item"><img src="${URL.createObjectURL(f)}" style="height:60px"><button class="file-preview-x" data-type="new" data-idx="${i}">&times;</button></div>`;
    });
    prev.innerHTML=h;
    // Bind remove buttons
    prev.querySelectorAll('.file-preview-x').forEach(btn=>{
      btn.onclick=e=>{e.stopPropagation();if(btn.dataset.type==='acc')accFiles.splice(parseInt(btn.dataset.idx),1);else newFiles.splice(parseInt(btn.dataset.idx),1);renderPreview()};
    });
  }

  // File input — accumulates
  ov.querySelector('#fu-input').onchange=function(){
    Array.from(this.files).forEach(f=>newFiles.push(f));
    this.value='';// reset so same file can be re-added
    renderPreview();
  };
  renderPreview();
}

function showExtModal(proj){showModal('Request Extension',`<div class="fg"><label class="fl">New Deadline</label><input type="date" class="fi" id="me1" value="${proj.endDate||''}"></div><div class="fg"><label class="fl">Reason</label><textarea class="fi" id="me2" style="min-height:100px"></textarea></div><div style="padding:12px;border-radius:8px;background:var(--yd);font-size:.82rem;color:var(--y);line-height:1.5">Your client will see this and can accept or decline.</div>`,async ov=>{const d=ov.querySelector('#me1').value,r=ov.querySelector('#me2').value.trim();if(!d||!r)return;await db.collection('projects').doc(proj.id).update({extensionRequest:{newDate:d,reason:r,status:'pending',requestedAt:new Date().toISOString()}});ov.remove()},'Send Request')}

// ═══ INIT ═══
const urlP=getUrlP();
if(urlP){(async()=>{const p=await loadProjectBySlug(urlP);if(p){state.clientProject=p;state.view='client-gate'}else{state.view='client';state.clientProject={title:'Not Found',clientName:'',description:'This project link is invalid.',status:'upcoming',phases:[],updates:[],startDate:'',endDate:''}}render()})()}
else{auth.onAuthStateChanged(u=>{state.user=u;if(u){state.view='admin';listenProjects()}else{state.view='login';if(state.unsub){state.unsub();state.unsub=null}state.projects=[];render()}})}
</script>
</body>
</html>
